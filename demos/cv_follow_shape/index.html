<!DOCTYPE html>
<html>
	<title>A Simple Demo</title>

	<meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1" />

    <style type="text/css">
        html, body {
            height:100%;
            width:100%;
            margin:0;
            touch-action:none;
            background-color:#121212;
        }
		canvas {
            touch-action:none;
            background-color: #bbbbbb;
        }
	</style>
	<head>
        <script src="Charm.js"></script>
        <script src="app.js"></script>

        <script type="text/javascript">
            var charm   = new Charm();
            window.addEventListener ("load", function () {
                charm.userGestureStarter("content0", function(){
                    app = new App(charm);
                    app.setLanguage("id");
                    app.start ("content0","auto");
                });

                window.oncontextmenu    = function (event) {
                        event.preventDefault ();
                        event.stopPropagation ();
                        return false;
                };
            });

        </script>
	</head>

	<body>
        <div id="content0" unselectable="on"
        style="
            background-color:#121212;
            position:relative;
            width: 100%;
            height:95%;
            margin-right: auto;
            margin-left: auto;
            margin-top:10px;">
        </div>
    </body>
</html>
